<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Desembaralhador de Palavras - Calcora</title>
  <meta name="description" content="Encontre palavras possíveis a partir de um conjunto de letras. Funciona com palavras acentuadas em português.">

  <link rel="stylesheet" href="/style.css">
</head>

<body>

<header>
  <a class="logo" href="/">calc<span>ora</span></a>
</header>

<main>
  <div class="card">

    <h1>Desembaralhador de Palavras</h1>
    <p>Digite letras sem acento. Por exemplo: <strong>acao</strong> também pode encontrar <strong>ação</strong>.</p>

    <label>Letras disponíveis</label>
    <input id="letters" type="text" placeholder="Ex: casa">

    <label>Tamanho mínimo</label>
    <input id="minLength" type="number" min="1" value="3">

    <label>Tamanho máximo</label>
    <input id="maxLength" type="number" min="1" placeholder="Opcional">

    <button onclick="findWords()">Encontrar palavras</button>

    <div class="result" id="summary"></div>
    <div id="results"></div>

  </div>
</main>

<script>
let wordList = [];

fetch('/data/palavras.txt')
  .then(response => response.text())
  .then(text => {
    wordList = text
      .split(/\r?\n/)
      .map(word => word.trim())
      .filter(word => word.length > 0);
  })
  .catch(() => {
    document.getElementById('summary').innerText =
      'Erro ao carregar o arquivo de palavras.';
  });

function normalizeText(text) {
  return text
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/ç/g, 'c');
}

function countLetters(text) {
  const counts = {};

  for (const char of text) {
    if (!/[a-z]/.test(char)) continue;
    counts[char] = (counts[char] || 0) + 1;
  }

  return counts;
}

function canBuildWord(word, availableCounts) {
  const wordCounts = countLetters(word);

  for (const char in wordCounts) {
    if (!availableCounts[char] || wordCounts[char] > availableCounts[char]) {
      return false;
    }
  }

  return true;
}

function findWords() {
  const lettersRaw = document.getElementById('letters').value;
  const minLength = parseInt(document.getElementById('minLength').value) || 1;
  const maxLengthInput = parseInt(document.getElementById('maxLength').value);

  const normalizedLetters = normalizeText(lettersRaw);
  const availableCounts = countLetters(normalizedLetters);

  const maxLength = maxLengthInput || normalizedLetters.length;

  if (!normalizedLetters || Object.keys(availableCounts).length === 0) {
    document.getElementById('summary').innerText = 'Digite algumas letras.';
    document.getElementById('results').innerHTML = '';
    return;
  }

  const matches = [];

  for (const originalWord of wordList) {
    const normalizedWord = normalizeText(originalWord);

    if (normalizedWord.length < minLength) continue;
    if (normalizedWord.length > maxLength) continue;

    if (canBuildWord(normalizedWord, availableCounts)) {
      matches.push(originalWord);
    }
  }

  matches.sort((a, b) => {
    if (b.length !== a.length) return b.length - a.length;
    return a.localeCompare(b, 'pt-BR');
  });

  document.getElementById('summary').innerText =
    matches.length + ' palavra(s) encontrada(s)';

  document.getElementById('results').innerHTML =
    matches.map(word => '<div class="word-result">' + word + '</div>').join('');
}
</script>

</body>
</html>
