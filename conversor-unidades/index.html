<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Conversor de Unidades - Calcora</title>
  <meta name="description" content="Converta unidades de comprimento, peso, temperatura, energia, potência e muito mais.">

  <link rel="stylesheet" href="/style.css">
</head>

<body>

<header>
  <a class="logo" href="/">calc<span>ora</span></a>
</header>

<main>
  <div class="card">

    <h1>Conversor de Unidades</h1>

    <label>Categoria</label>
    <select id="category" onchange="updateUnits()"></select>

    <label>Valor</label>
    <input type="number" id="inputValue" placeholder="Digite um valor">

    <label>De</label>
    <select id="fromUnit"></select>

    <label>Para</label>
    <select id="toUnit"></select>

    <button onclick="convert()">Converter</button>

    <div class="result" id="result"></div>

  </div>
</main>

<script>

const categories = {

  comprimento: {
    meter: 1,
    kilometer: 1000,
    centimeter: 0.01,
    millimeter: 0.001,
    mile: 1609.34,
    foot: 0.3048,
    inch: 0.0254
  },

  area: {
    "m²": 1,
    "km²": 1000000,
    hectare: 10000,
    acre: 4046.86
  },

  volume: {
    liter: 1,
    milliliter: 0.001,
    gallon_us: 3.78541,
    gallon_uk: 4.54609,
    cubic_meter: 1000
  },

  massa: {
    kilogram: 1,
    gram: 0.001,
    pound: 0.453592,
    ounce: 0.0283495
  },

  velocidade: {
    "km/h": 1,
    mph: 1.60934,
    knot: 1.852
  },

  energia: {
    joule: 1,
    kilojoule: 1000,
    calorie: 4.184,
    kilowatt_hour: 3600000,
    btu: 1055.06
  },

  potencia: {
    watt: 1,
    kilowatt: 1000,
    horsepower: 745.7,
    cv: 735.5
  },

  pressao: {
    pascal: 1,
    bar: 100000,
    psi: 6894.76,
    atm: 101325
  },

  tempo: {
    second: 1,
    minute: 60,
    hour: 3600,
    day: 86400
  },

  dados: {
    byte: 1,
    kilobyte: 1024,
    megabyte: 1048576,
    gigabyte: 1073741824
  },

  combustivel: {
    "km/l": 1,
    mpg_us: 0.425144,
    "L/100km": 100
  }

};

const categorySelect = document.getElementById("category");
const fromUnit = document.getElementById("fromUnit");
const toUnit = document.getElementById("toUnit");

for (const category in categories) {
  const option = document.createElement("option");
  option.value = category;
  option.textContent = category;
  categorySelect.appendChild(option);
}

function updateUnits() {

  const category = categorySelect.value;

  fromUnit.innerHTML = "";
  toUnit.innerHTML = "";

  for (const unit in categories[category]) {

    const option1 = document.createElement("option");
    option1.value = unit;
    option1.textContent = unit;

    const option2 = document.createElement("option");
    option2.value = unit;
    option2.textContent = unit;

    fromUnit.appendChild(option1);
    toUnit.appendChild(option2);
  }
}

function convert() {

  const category = categorySelect.value;
  const value = parseFloat(document.getElementById("inputValue").value);

  if (isNaN(value)) {
    document.getElementById("result").innerText = "Digite um valor válido";
    return;
  }

  if (category === "temperatura") {
    convertTemperature(value);
    return;
  }

  if (category === "combustivel") {
    convertFuel(value);
    return;
  }

  const from = fromUnit.value;
  const to = toUnit.value;

  const baseValue = value * categories[category][from];
  const result = baseValue / categories[category][to];

  document.getElementById("result").innerText =
    `${value} ${from} = ${result.toFixed(4)} ${to}`;
}

function convertFuel(value) {

  const from = fromUnit.value;
  const to = toUnit.value;

  let kmPerLiter;

  if (from === "km/l") {
    kmPerLiter = value;
  }

  if (from === "mpg_us") {
    kmPerLiter = value * 0.425144;
  }

  if (from === "L/100km") {
    kmPerLiter = 100 / value;
  }

  let result;

  if (to === "km/l") {
    result = kmPerLiter;
  }

  if (to === "mpg_us") {
    result = kmPerLiter / 0.425144;
  }

  if (to === "L/100km") {
    result = 100 / kmPerLiter;
  }

  document.getElementById("result").innerText =
    `${value} ${from} = ${result.toFixed(4)} ${to}`;
}

function convertTemperature(value) {

  const from = fromUnit.value;
  const to = toUnit.value;

  let celsius;

  if (from === "C") celsius = value;
  if (from === "F") celsius = (value - 32) * 5/9;
  if (from === "K") celsius = value - 273.15;

  let result;

  if (to === "C") result = celsius;
  if (to === "F") result = celsius * 9/5 + 32;
  if (to === "K") result = celsius + 273.15;

  document.getElementById("result").innerText =
    `${value} ${from} = ${result.toFixed(2)} ${to}`;
}

categories.temperatura = {
  C: 1,
  F: 1,
  K: 1
};

updateUnits();

</script>

</body>
</html>
