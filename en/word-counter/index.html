<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Word and Character Counter - Calcora</title>
  <meta name="description" content="Count words, characters, sentences, and paragraphs quickly with this free online text counter.">

  <link rel="alternate" hreflang="pt-BR" href="https://calcora.xyz/contador-palavras/">
  <link rel="alternate" hreflang="en-US" href="https://calcora.xyz/en/word-counter/">

  <link rel="stylesheet" href="/style.css">
</head>

<body>

<header>
  <a class="logo" href="/">calc<span>ora</span></a>
</header>

<main>
  <div class="card">

    <p><a href="/contador-palavras/">Português</a></p>

    <h1>Word and Character Counter</h1>
    <p>Type or paste your text below to count words, characters, sentences, and paragraphs.</p>

    <label>Text</label>
    <textarea id="text" placeholder="Type or paste your text here..." oninput="countText()"></textarea>

    <div class="result" id="result">
      Words: 0<br>
      Characters: 0<br>
      Characters without spaces: 0<br>
      Sentences: 0<br>
      Paragraphs: 0
    </div>

  </div>
</main>

<script>
function countText() {
  const text = document.getElementById('text').value;

  const trimmed = text.trim();

  const words = trimmed
    ? trimmed.split(/\s+/).filter(Boolean).length
    : 0;

  const characters = text.length;
  const charactersNoSpaces = text.replace(/\s/g, '').length;

  const sentences = trimmed
    ? trimmed.split(/[.!?]+/).filter(sentence => sentence.trim().length > 0).length
    : 0;

  const paragraphs = trimmed
    ? trimmed.split(/\n+/).filter(paragraph => paragraph.trim().length > 0).length
    : 0;

  document.getElementById('result').innerHTML =
    "Words: " + words + "<br>" +
    "Characters: " + characters + "<br>" +
    "Characters without spaces: " + charactersNoSpaces + "<br>" +
    "Sentences: " + sentences + "<br>" +
    "Paragraphs: " + paragraphs;
}
</script>

</body>
</html>
