<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gerador de CPF - Calcora</title>
  <meta name="description" content="Gere CPFs válidos para testes de software, formulários e desenvolvimento.">

  <link rel="stylesheet" href="/style.css">
</head>

<body>

<header>
  <a class="logo" href="/">calc<span>ora</span></a>
</header>

<main>
  <div class="card">

    <h1>Gerador de CPF</h1>
    <p>Gere um CPF válido para testes. Não use para fins ilegais ou para se passar por outra pessoa.</p>

    <button onclick="generateCPF()">Gerar CPF</button>

    <div class="result" id="result"></div>

  </div>
</main>

<script>
function randomDigit() {
  return Math.floor(Math.random() * 10);
}

function calculateDigit(numbers, factor) {
  let total = 0;

  for (let i = 0; i < numbers.length; i++) {
    total += numbers[i] * factor;
    factor--;
  }

  const rest = total % 11;
  return rest < 2 ? 0 : 11 - rest;
}

function formatCPF(numbers) {
  return numbers.join('').replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}

function generateCPF() {
  const numbers = [];

  for (let i = 0; i < 9; i++) {
    numbers.push(randomDigit());
  }

  const digit1 = calculateDigit(numbers, 10);
  numbers.push(digit1);

  const digit2 = calculateDigit(numbers, 11);
  numbers.push(digit2);

  document.getElementById('result').innerText = formatCPF(numbers);
}
</script>

</body>
</html>
